<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Boast It UP is the AI Growth Intelligence platform. Know where your brand shows up in AI answers across ChatGPT, Perplexity, and Google AI Overviews, and the one move that closes the gap."
    />
    <title>Boast It UP — AI Growth Intelligence Platform</title>
    <script>
      (function () {
        var stored = localStorage.getItem("biu-theme");
        var dark =
          stored === "dark" ||
          (stored !== "light" &&
            window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) document.documentElement.classList.add("dark");
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
